@if (showIcon && status !== 'generic') {
  <div class="lg-validation__icon">
    @switch (status) {
      @case ('error') {
        <lg-icon name="crossmark-spot-filled" />
      }
      @case ('info') {
        <lg-icon name="information-filled" />
      }
      @case ('warning') {
        <lg-icon name="warning-filled" />
      }
      @case ('success') {
        <lg-icon name="checkmark-spot-filled" />
      }
    }
  </div>
}

<div>
  <ng-content />
</div>
