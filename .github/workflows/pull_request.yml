# Note that changing the name of this workflow will affect the
# code in gh-pages/download-branch-deploy-artifact.cjs
name: Pull request

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  actions: read
  packages: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 'Setup node'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{secrets.GITHUB_TOKEN}}" >> ~/.npmrc
          npm ci

      - name: 'Lint commit'
        if: ${{ !startsWith(github.head_ref, 'dependabot-')  }}
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: 'Eslint'
        run: npm run eslint

      - name: 'Stylelint'
        run: npm run stylelint

      - name: 'Build'
        run: npm run build

      - name: 'Unit tests'
        run: npm run test:ci

      - name: 'Install build dependencies'
        run: npm --prefix ./dist/canopy install

      - name: 'License check build dependencies'
        run: npm run license-check:build

      - name: 'Build test app'
        run: npm run build:test-app

      - name: 'Build storybook'
        run: npm run build:storybook -- --output-dir ./lg-sb-build

      - name: 'Upload storybook build'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lg-sb-build
          path: ./lg-sb-build
          overwrite: true

  check-docs-skills:
    name: 'Check best-practice skills'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 'Check that .mdx changes are accompanied by skill updates'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const checkDocsSkills = require('./.github/workflow-scripts/check-docs-skills.cjs')
            await checkDocsSkills({ github, context, core })
