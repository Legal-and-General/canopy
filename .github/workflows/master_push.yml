name: Push to master

on:
  push:
    branches:
      - master
      - next
      - legacy
      - '[0-9]*.x'
      - '[0-9]*.[0-9]*.x'
    tags-ignore:
      - '*'

permissions:
  contents: write
  packages: write
  deployments: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 'Setup node'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{secrets.GITHUB_TOKEN}}" >> ~/.npmrc
          npm ci

      - name: 'Build library'
        run: npm run build

      - name: 'Upload dist folder'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.event.repository.name }}
          path: dist/canopy/
          overwrite: true

  release:
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 'Setup node'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{secrets.GITHUB_TOKEN}}" >> ~/.npmrc
          npm ci

      - name: 'Download dist folder'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ github.event.repository.name }}
          path: dist/canopy/

      - name: 'Zip library'
        run: zip -r dist/canopy.zip dist/canopy

      - name: 'Release'
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [ build ]
    runs-on: ubuntu-latest
    if: github.ref_name == 'master' || github.ref_name == 'next' || github.ref_name == 'legacy'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 'Setup node'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Install dependencies'
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{secrets.GITHUB_TOKEN}}" >> ~/.npmrc
          npm ci

      - name: 'Download dist folder'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ github.event.repository.name }}
          path: dist/canopy/

      - name: 'Build icons'
        run: npm run build:icons

      - name: 'Set Storybook output directory'
        run: echo "SB_OUTPUT_DIR=${{ github.ref_name == 'master' && './lg-sb-build' || format('./docs/lg-sb-{0}', github.ref_name) }}" >> $GITHUB_ENV

      - name: 'Build storybook'
        run: npm run build:storybook -- --output-dir $SB_OUTPUT_DIR

      - name: 'Update visual baselines'
        if: github.ref_name == 'master'
        run: npx percy storybook $SB_OUTPUT_DIR --config=.percy.yml
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          PERCY_BRANCH: '${{ github.ref_name }}'
          PERCY_STORYBOOK_DOC_CAPTURE: true
          NETWORK_IDLE_WAIT_TIMEOUT: 5000

      - name: 'Deployment to GitHub Pages'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const deployBranch = require('./.github/workflow-scripts/gh-pages/deploy.cjs');
            await deployBranch({
              branch: '${{ github.ref_name }}',
              sha: '${{ github.sha }}',
              github,
              context,
              exec,
              core
            });
